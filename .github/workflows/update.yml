```yaml
   name: AI db Leo Auto-Update

   on:
     schedule:
       - cron: '*/15 * * * *'
     workflow_dispatch:

   jobs:
     build-and-update:
       runs-on: ubuntu-latest
       permissions:
         contents: write

       steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Set up Python
           uses: actions/setup-python@v5
           with:
             python-version: '3.10'

         - name: Install dependencies
           run: |
             python -m pip install --upgrade pip
             pip install -r requirements.txt

         - name: Execute AI Scraper
           run: python scraper.py

         - name: Commit and push JSON
           run: |
             git config --local user.email "action@github.com"
             git config --local user.name "AI db Leo Bot"
             git add news.json
             git diff-index --quiet HEAD || git commit -m "Automated AI news sync"
             git push
